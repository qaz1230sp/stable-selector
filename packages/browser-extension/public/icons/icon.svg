<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#4A90D2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Crosshair circle -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  <!-- Crosshair lines -->
  <line x1="64" y1="28" x2="64" y2="48" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="64" y1="80" x2="64" y2="100" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="28" y1="64" x2="48" y2="64" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="80" y1="64" x2="100" y2="64" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="white"/>
  <!-- Left angle bracket < -->
  <polyline points="50,52 40,64 50,76" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right angle bracket > -->
  <polyline points="78,52 88,64 78,76" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
