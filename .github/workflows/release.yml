name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'release-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-core:
    name: Publish stable-selector to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/stable-selector
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify build quality
        run: |
          pnpm run typecheck
          pnpm test
          pnpm run build

      - name: Ensure package is not already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./packages/core/package.json').name")
          PKG_VERSION=$(node -p "require('./packages/core/package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION is not published yet."
          fi

      - name: Publish stable-selector
        if: steps.check.outputs.published == 'false'
        working-directory: packages/core
        run: npm publish --provenance --access public

  package-extension:
    name: Package browser extension and upload to release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-core
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension zip
        run: pnpm --filter @stable-selector/browser-extension run zip

      - name: Locate extension zip
        id: zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH=$(find packages/browser-extension/.output -maxdepth 1 -name '*.zip' | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "No extension zip found in packages/browser-extension/.output"
            exit 1
          fi
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.zip.outputs.path }}
